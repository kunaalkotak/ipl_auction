<h1>🏏 IPL Player Auction</h1>

<form method="GET">

<select name="role">
<option value="">All Roles</option>
<option value="Batsman">Batsman</option>
<option value="Bowler">Bowler</option>
<option value="All-Rounder">All-Rounder</option>
<option value="Wicketkeeper">Wicketkeeper</option>
</select>

<button type="submit">Filter</button>

</form>

<table border="1">

<tr>
<th>Player</th>
<th>Team</th>
<th>Role</th>
<th>Base Price</th>
<th>Current Bid</th>
<th>Stats</th>
<th>Bid</th>
</tr>

{% for player in players %}

<tr>

<td>{{player[1]}}</td>
<td>{{player[3]}}</td>
<td>{{player[2]}}</td>
<td>{{player[4]}}</td>
<td>{{player[5]}}</td>

<td>
<a href="/player/{{player[0]}}">
View Stats
</a>
</td>

<td>

<form action="/bid/{{player[0]}}" method="POST">

<input
type="number"
name="bid"
min="{{player[5] + 1}}"
required>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>
