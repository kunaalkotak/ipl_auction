<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL Auction System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}

h1{
    margin-top:30px;
    color:#333;
}

table{
    width:80%;
    margin:30px auto;
    border-collapse:collapse;
    background:white;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
}

th{
    background:#ffcc00;
}

tr:nth-child(even){
    background:#f9f9f9;
}

input{
    padding:6px;
    width:120px;
}

button{
    padding:7px 14px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<h1>🏏 IPL Player Auction</h1>

<table>

<tr>
<th>Player</th>
<th>Base Price (₹)</th>
<th>Current Bid (₹)</th>
<th>Place Bid</th>
</tr>

{% for player in players %}

<tr>

<td>{{ player[1] }}</td>

<td>{{ player[2] }}</td>

<td>{{ player[3] }}</td>

<td>

<form action="/bid/{{ player[0] }}" method="POST">

<input 
type="number"
name="bid"
placeholder="Enter bid"
min="{{ player[3] + 1 }}"
required>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
